name: CI (web)

# Auto-runs on every push + pull request.
# Robot reviewer: lint -> typecheck -> test -> build -> file-size.
# Each step is its own job step so failures are obvious.

on:
  push:
    branches: [main, master]
    # Docs-only commits don't change what CI verifies — skip the run for them.
    # GOTCHA: a docs-only `done(...)` push is also skipped; if the phase touched
    # code, trigger CI manually: gh workflow run "<this workflow name>" --ref main
    paths-ignore:
      - "**.md"
      - "docs/**"
      - "graphify-out/**"
  pull_request:
    branches: [main, master]
    paths-ignore:
      - "**.md"
      - "docs/**"
      - "graphify-out/**"
  workflow_dispatch: # manual run (e.g. when paths-ignore skipped a done commit)

# A newer push supersedes the in-flight run — cancel the stale one. Saves
# Actions minutes (private repos only get 2,000 free min/month).
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

# Least-privilege token: CI only reads the repo.
permissions:
  contents: read

jobs:
  ci:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout code
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      - name: Setup Node.js 22
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Typecheck
        run: npx tsc --noEmit

      - name: Unit + integration tests
        run: npm test -- --run

      - name: Build
        run: npm run build

      - name: File-size budget check
        run: node scripts/check-file-sizes.mjs

  # Real-browser E2E. Separate job so the fast unit gate above isn't slowed by
  # the browser install. Auto-skips until the Playwright scaffold is filled in
  # (e2e/auth.setup.ts exists) — see e2e/README.md.
  e2e:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout code
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      - name: Setup Node.js 22
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: '22'
          cache: 'npm'

      - name: Check E2E is set up
        id: e2e
        run: |
          if [ -f e2e/auth.setup.ts ]; then
            echo "ready=true" >> "$GITHUB_OUTPUT"
          else
            echo "ready=false" >> "$GITHUB_OUTPUT"
            echo "::notice::e2e/auth.setup.ts not found — skipping E2E. Fill in the scaffold (see e2e/README.md)."
          fi

      - name: Install dependencies
        if: steps.e2e.outputs.ready == 'true'
        run: npm ci

      - name: Install Chromium
        if: steps.e2e.outputs.ready == 'true'
        run: npx playwright install --with-deps chromium

      - name: Run E2E
        if: steps.e2e.outputs.ready == 'true'
        run: npm run test:e2e

      - name: Upload report on failure
        if: ${{ failure() && steps.e2e.outputs.ready == 'true' }}
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7
