name: CI (Tauri)

# Auto-runs on every push + pull request.
# Robot reviewer: frontend (lint/typecheck/test) + Rust (clippy/test) + size check.
# Skipped: full release build per OS (slow; do on tag push instead).

on:
  push:
    branches: [main, master]
    # Docs-only commits don't change what CI verifies — skip the run for them.
    # GOTCHA: a docs-only `done(...)` push is also skipped; if the phase touched
    # code, trigger CI manually: gh workflow run "<this workflow name>" --ref main
    paths-ignore:
      - "**.md"
      - "docs/**"
      - "graphify-out/**"
  pull_request:
    branches: [main, master]
    paths-ignore:
      - "**.md"
      - "docs/**"
      - "graphify-out/**"
  workflow_dispatch: # manual run (e.g. when paths-ignore skipped a done commit)

# A newer push supersedes the in-flight run — cancel the stale one. Saves
# Actions minutes (private repos only get 2,000 free min/month).
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

# Least-privilege token: CI only reads the repo.
permissions:
  contents: read

jobs:
  frontend:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5.0.1
      - uses: actions/setup-node@a0853c24544627f65ddf259abe73b1d18a591444 # v5.0.0
        with:
          node-version: '22'
          cache: 'npm'
      - run: npm ci
      - run: npm run lint
      - run: npx tsc --noEmit
      - run: npm test -- --run
      - run: node scripts/check-file-sizes.mjs

  rust:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    defaults:
      run:
        working-directory: src-tauri
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5.0.1
      - name: Install Linux Tauri build deps
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf
      # SHA-pinned: this action normally selects the toolchain via its ref
      # (@stable), so with a SHA ref the toolchain must be named explicitly.
      - uses: dtolnay/rust-toolchain@3c5f7ea28cd621ae0bf5283f0e981fb97b8a7af9 # master 2026-05
        with:
          toolchain: stable
          components: clippy, rustfmt
      - uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1
        with:
          workspaces: src-tauri
      - name: Format check
        run: cargo fmt --all -- --check
      - name: Clippy
        run: cargo clippy --all-targets -- -D warnings
      - name: Rust tests
        run: cargo test
