name: CI (Flutter)

# Auto-runs on every push + pull request.
# Robot reviewer: analyze -> test -> build APK -> file-size.

on:
  push:
    branches: [main, master]
    # Docs-only commits don't change what CI verifies — skip the run for them.
    # GOTCHA: a docs-only `done(...)` push is also skipped; if the phase touched
    # code, trigger CI manually: gh workflow run "<this workflow name>" --ref main
    paths-ignore:
      - "**.md"
      - "docs/**"
      - "graphify-out/**"
  pull_request:
    branches: [main, master]
    paths-ignore:
      - "**.md"
      - "docs/**"
      - "graphify-out/**"
  workflow_dispatch: # manual run (e.g. when paths-ignore skipped a done commit)

# A newer push supersedes the in-flight run — cancel the stale one. Saves
# Actions minutes (private repos only get 2,000 free min/month).
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

# Least-privilege token: CI only reads the repo.
permissions:
  contents: read

jobs:
  ci:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout code
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      - name: Setup Flutter
        uses: subosito/flutter-action@1a449444c387b1966244ae4d4f8c696479add0b2 # v2.23.0
        with:
          channel: 'stable'
          cache: true

      - name: Setup Node.js 22 (for file-size script)
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: '22'

      - name: Install Flutter dependencies
        run: flutter pub get

      - name: Analyze (lint + typecheck)
        run: flutter analyze --fatal-infos

      - name: Run tests
        run: flutter test --coverage

      - name: Build Android APK (debug)
        run: flutter build apk --debug

      - name: File-size budget check
        run: node scripts/check-file-sizes.mjs
