name: CI (Flutter)

# Auto-runs on every push + pull request.
# Robot reviewer: analyze -> test -> build APK -> file-size.

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  ci:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          cache: true

      - name: Setup Node.js 22 (for file-size script)
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install Flutter dependencies
        run: flutter pub get

      - name: Analyze (lint + typecheck)
        run: flutter analyze --fatal-infos

      - name: Run tests
        run: flutter test --coverage

      - name: Build Android APK (debug)
        run: flutter build apk --debug

      - name: File-size budget check
        run: node scripts/check-file-sizes.mjs
