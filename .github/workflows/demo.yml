name: Render demo GIF

# Renders demo/demo.tape into demo/vibe-coding-demo.gif on Linux (where VHS is
# reliable) and commits the result back. Runs on demand, or when the tape changes.
on:
  workflow_dispatch:
  push:
    paths:
      - 'demo/demo.tape'
      - '.github/workflows/demo.yml'

# Needs write: the job commits the rendered GIF back to the repo.
permissions:
  contents: write

# A newer tape edit supersedes an in-flight render — cancel the stale run.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  render:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          ref: ${{ github.head_ref || github.ref_name }}

      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: '22'

      - name: Install VHS + ffmpeg + ttyd
        run: |
          sudo mkdir -p /etc/apt/keyrings
          curl -fsSL https://repo.charm.sh/apt/gpg.key | sudo gpg --dearmor -o /etc/apt/keyrings/charm.gpg
          echo "deb [signed-by=/etc/apt/keyrings/charm.gpg] https://repo.charm.sh/apt/ * *" | sudo tee /etc/apt/sources.list.d/charm.list
          sudo apt-get update
          sudo apt-get install -y vhs ffmpeg ttyd

      - name: Render demo GIF
        run: vhs demo/demo.tape

      - name: Commit the regenerated GIF
        # SHA-pinned (third-party action WITH write perms — highest supply-chain risk)
        uses: stefanzweifel/git-auto-commit-action@b863ae1933cb653a53c021fe36dbb774e1fb9403 # v5.2.0
        with:
          commit_message: 'docs: regenerate demo gif [skip ci]'
          file_pattern: demo/vibe-coding-demo.gif
