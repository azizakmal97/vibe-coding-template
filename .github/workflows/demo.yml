name: Render demo GIF

# Renders demo/demo.tape into demo/vibe-coding-demo.gif on Linux (where VHS is
# reliable) and commits the result back. Runs on demand, or when the tape changes.
on:
  workflow_dispatch:
  push:
    paths:
      - 'demo/demo.tape'
      - '.github/workflows/demo.yml'

permissions:
  contents: write

jobs:
  render:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Render with VHS
        uses: charmbracelet/vhs-action@v2
        with:
          path: demo/demo.tape

      - name: Commit the regenerated GIF
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: 'docs: regenerate demo gif [skip ci]'
          file_pattern: demo/vibe-coding-demo.gif
